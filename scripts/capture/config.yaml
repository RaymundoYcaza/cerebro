vault_root: /mnt/disc-a00/Z01-DEVOPS/workspaces/personal/cerebro/vault/raymundo_ideaverse

defaults:
  date_format: "%Y-%m-%d"
  datetime_format: "%Y-%m-%d %H:%M"
  filename_max_length: 80
  default_assistant: manual
  openai_model: gpt-4.1-mini

profiles:
  spark:
    output_dir: "+"
    template_path: "Templates/capture/spark.md"
    filename_strategy: "timestamp-title"
    assistant_modes: ["manual", "openai"]

  source:
    output_dir: "Sources"
    template_path: "Templates/capture/source.md"
    filename_strategy: "title"
    assistant_modes: ["manual", "openai"]

  contact:
    output_dir: "Contacts"
    template_path: "Templates/capture/contact.md"
    filename_strategy: "title"
    assistant_modes: ["manual", "openai"]

  aurora:
    output_dir: "Atlas/Dots/X"
    template_path: "x/Templates/aurora.md"
    filename_strategy: "timestamp-title"
    assistant_modes: ["manual", "openai"]
