vault_root: /mnt/disc-a00/Z01-DEVOPS/workspaces/personal/cerebro/vault/raymundo_ideaverse
templates_root: /mnt/disc-a00/Z01-DEVOPS/workspaces/personal/cerebro/vault/raymundo_ideaverse/x/Templates/

defaults:
  date_format: "%Y-%m-%d"
  datetime_format: "%Y-%m-%d %H:%M"
  filename_max_length: 80
  default_assistant: manual
  openai_model: gpt-4.1-mini

profiles:
  spark:
    output_dir: "+/sparks"
    template: "spark.md"
    filename_strategy: "timestamp-title"
    assistant_modes: ["manual", "openai"]

  source:
    output_dir: "Sources"
    template: "source.md"
    filename_strategy: "title"
    assistant_modes: ["manual", "openai"]

  contact:
    output_dir: "Contacts"
    template: "contact.md"
    filename_strategy: "title"
    assistant_modes: ["manual", "openai"]
